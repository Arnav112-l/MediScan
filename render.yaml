# MediScan API on Render — Docker (Playwright Chromium + Tesseract in backend/Dockerfile)
#
# Dashboard: New → Blueprint → connect repo, or edit existing Web Service:
#   Environment: Docker
#   Dockerfile Path: backend/Dockerfile
#   Docker Context: backend

services:
  - type: web
    name: mediscan-api
    runtime: docker
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
